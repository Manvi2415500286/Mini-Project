<!DOCTYPE html>
<html>

    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: #1f2d3d;
            color: white;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* HERO SECTION */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px;
            background: white;
        }

        .hero-text {
            width: 50%;
        }

        .hero-text h1 {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .hero-text p {
            color: gray;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 12px 25px;
            background: #ff5a5f;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .hero button:hover {
            background: #e0484d;
        }

        .hero img {
            width: 45%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>🎓 Student AI</b></div>

    <div>
        <a href="/home">Home</a>
        <a href="/predict">Predict</a>
        <a href="/signup">Signup</a>
        <a href="/login">Login</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- HERO SECTION -->
<div class="hero">

    <div class="hero-text">
        <h1>AI-Based Student Performance System</h1>

        <p>
            Predict student academic performance using machine learning 
            and take early action to improve results.
        </p>

        <a href="/predict">
            <button>Check Prediction</button>
        </a>
    </div>

    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
</div>

</body>
</html>
