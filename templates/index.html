<!DOCTYPE html>

<html>
<head>
    <title>Prediction</title>

```
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
    }

    .container {
        width: 400px;
        margin: 80px auto;
        background: #1e293b;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: none;
        border-radius: 5px;
    }

    input:focus {
        outline: none;
        box-shadow: 0 0 5px #06b6d4;
    }

    label {
        display: block;
        text-align: left;
        margin-top: 10px;
        font-size: 14px;
    }

    .hint {
        display: block;
        font-size: 12px;
        color: #cbd5e1;
        margin-bottom: 5px;
        text-align: left;
    }

    .btn {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #06b6d4;
        color: white;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
    }

    .btn:hover {
        background: #0891b2;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        background: #334155;
        border-radius: 8px;
    }

    img {
        margin-top: 20px;
        width: 100%;
        border-radius: 10px;
    }

</style>
```

</head>

<body>

<div class="container">

```
<h2>Student Performance Prediction</h2>

<form method="POST">

    <label>Study Time</label>
    <input type="number" name="studytime" required>

    <label>Failures</label>
    <input type="number" name="failures" required>

    <label>Absences</label>
    <input type="number" name="absences" required>

    <label>G1 (First Test Marks)</label>
    <small class="hint">Marks obtained in first exam</small>
    <input type="number" name="G1" required>

    <label>G2 (Second Test Marks)</label>
    <small class="hint">Marks obtained in second exam</small>
    <input type="number" name="G2" required>

    <label>Health</label>
    <input type="number" name="health" required>

    <label>Free Time</label>
    <input type="number" name="freetime" required>

    <label>Going Out</label>
    <input type="number" name="goout" required>

    <button class="btn">Predict</button>

</form>

{% if submitted %}
<div class="result">
    <h3>Predicted Grade: {{ prediction }}</h3>
    <p>Status: {{ status }}</p>
    <p>Suggestion: {{ suggestion }}</p>
</div>
{% endif %}

{% if chart %}
    <img src="data:image/png;base64,{{ chart }}">
{% endif %}
```

</div>

</body>
</html>
