<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        p {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            width: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <body>

<div style="text-align:right; padding:10px;">
    <a href="/home">Home</a> |
    <a href="/logout">Logout</a>
</div>

<p style="padding-left:10px;">Welcome, {{ session['user'] }}</p>

<h1>🎓 AI Student Performance Predictor</h1>
<p>📌 Early Academic Intervention System</p>

<div class="container">

    <!-- LEFT SIDE FORM -->
    <div class="card">
        <h2>📊 Student Predictor</h2>

        <form method="POST">

            <label>Study Time (1-4)</label>
            <input type="number" name="studytime" min="1" max="4" required>

            <label>Failures</label>
            <input type="number" name="failures" min="0" required>

            <label>Absences</label>
            <input type="number" name="absences" min="0" required>

            <label>G1 Grade</label>
            <input type="number" name="G1" min="0" max="20" required>

            <label>G2 Grade</label>
            <input type="number" name="G2" min="0" max="20" required>

            <button type="submit">🔍 Predict</button>
        </form>

        {% if submitted %}
        <div class="result">
            <h3>🎯 Predicted Grade: {{ prediction }}</h3>
            <h4>Status: {{ status }}</h4>
            <p>{{ suggestion }}</p>
        </div>
        {% endif %}

    </div>

    <!-- RIGHT SIDE CHART -->
    <div class="card">
        <h2>📈 Performance Chart</h2>
        <img src="data:image/png;base64,{{ chart }}" width="100%">
    </div>

</div>

</body>
</html>
