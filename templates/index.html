<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>
</head>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
        }

        /* MAIN CONTAINER */
        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        /* LEFT SIDE (FORM) */
        .form-box {
            width: 50%;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
        }

       

       
       
<!-- HEADER -->
<div class="header">
    <div>Welcome, {{ session['user'] }}</div>
    <div>
        <a href="/home" style="color:white;">Home</a> |
        <a href="/logout" style="color:white;">Logout</a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

    <!-- LEFT SIDE -->
    <div class="form-box">
        <h2>Student Predictor</h2>

        <form method="POST">
            <input type="number" name="studytime" placeholder="Study Time (1-4)" required>
            <input type="number" name="failures" placeholder="Failures" required>
            <input type="number" name="absences" placeholder="Absences" required>
            <input type="number" name="G1" placeholder="G1" required>
            <input type="number" name="G2" placeholder="G2" required>

            <input type="number" name="health" placeholder="Health (1-5)" required>
            <input type="number" name="freetime" placeholder="Free Time (1-5)" required>
            <input type="number" name="goout" placeholder="Going Out (1-5)" required>

            <button type="submit">Predict</button>
        </form>

        {% if submitted %}
        <div class="result">
            <h3>Prediction: {{ prediction }}</h3>
            <p>Status: {{ status }}</p>
            <p>{{ suggestion }}</p>
            <p><b>Accuracy:</b> {{ accuracy }}</p>
        </div>
        {% endif %}

    </div>

    <!-- RIGHT SIDE -->
    <div class="chart-box">
        <h2>Performance Chart</h2>
        <img src="data:image/png;base64,{{ chart }}" width="100%">
    </div>

</div>

</body>
</html>
