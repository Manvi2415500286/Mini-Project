<!DOCTYPE html>
<html>
<head>
<title>AI Student Performance Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#667eea,#764ba2);
    margin:0;
    padding:0;
}

.header{
    text-align:center;
    color:white;
    padding:20px;
}

.container{
    display:flex;
    justify-content:space-around;
    padding:30px;
}

.card{
    background:white;
    width:45%;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5a67d8;
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    background:#f2f2f2;
}

.chart{
    text-align:center;
}

h3{
    text-align:center;
}

</style>

</head>

<body>

<div class="header">
<h1>AI Student Performance Predictor</h1>
<p>Early Academic Intervention System</p>
</div>

<div class="container">

<!-- LEFT SIDE FORM -->

<div class="card">

<h3>Student Predictor</h3>

<form method="POST">

<label>Study Time (1-4)</label>
<input type="number" name="studytime" required>

<label>Failures</label>
<input type="number" name="failures" required>

<label>Absences</label>
<input type="number" name="absences" required>

<label>G1 Grade</label>
<input type="number" name="G1" required>

<label>G2 Grade</label>
<input type="number" name="G2" required>

<button type="submit">Predict Performance</button>

</form>

{% if submitted %}

<div class="result">

<h3>Predicted Grade: {{ prediction }}</h3>
<h3>Status: {{ status }}</h3>

</div>

{% endif %}

</div>


<!-- RIGHT SIDE CHART -->

<div class="card chart">

<h3>Performance Chart</h3>

{% if chart %}

<img src="data:image/png;base64,{{ chart }}" width="100%">

{% endif %}

</div>

</div>

</body>
</html>
