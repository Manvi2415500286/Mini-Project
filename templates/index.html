<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        p {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            width: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #f0f0f0;
        }
    </style>
</head>

<body>

<div style="text-align:right;">
    <a href="/home">Home</a> |
    <a href="/logout">Logout</a>
</div>

<p>Welcome, {{ session['user'] }}</p>

<h2>Student Predictor</h2>

<form method="POST">
    <input type="number" name="studytime" placeholder="Study Time" required>
    <input type="number" name="failures" placeholder="Failures" required>
    <input type="number" name="absences" placeholder="Absences" required>
    <input type="number" name="G1" placeholder="G1" required>
    <input type="number" name="G2" placeholder="G2" required>

    <input type="number" name="health" placeholder="Health (1-5)" required>
    <input type="number" name="freetime" placeholder="Free Time (1-5)" required>
    <input type="number" name="goout" placeholder="Going Out (1-5)" required>

    <button type="submit">Predict</button>
</form>

{% if submitted %}
<h3>Prediction: {{ prediction }}</h3>
<p>Status: {{ status }}</p>
<p>{{ suggestion }}</p>
<p>Accuracy: {{ accuracy }}</p>
{% endif %}

<img src="data:image/png;base64,{{ chart }}">
</body>


</html>
