<!DOCTYPE html>

<html>
<head>
    <title>Login</title>

```
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #0f172a, #1e293b);
        color: white;
    }

    /* CENTER BOX */
    .container {
        width: 350px;
        margin: 100px auto;
        background: #1e293b;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .logo {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* INPUT */
    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
    }

    
```

</head>

<body>

<div class="container">

```
<div class="logo">🎓 Student AI</div>

<form method="POST" action="/login">

    <input type="text" name="username" placeholder="Username" required>

    <input type="password" name="password" placeholder="Password" required>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <button class="btn">Login</button>

</form>



</div>

</body>
</html>
