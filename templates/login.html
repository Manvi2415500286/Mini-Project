<!DOCTYPE html>

<html>
<head>
    <title>Login</title>

```
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
    }

    /* CONTAINER */
    .container {
        width: 350px;
        margin: 80px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* LOGO */
    .logo {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* INPUT */
    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #cbd5e1;
        border-radius: 5px;
        background: #e2e8f0;
    }

    input:focus {
        outline: none;
        border-color: #06b6d4;
        background: white;
    }

    /* VERIFY BOX */
    .verify {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        border: 1px solid #cbd5e1;
        border-radius: 5px;
        background: #f9fafb;
        margin-top: 10px;
    }

    .verify span {
        font-size: 14px;
        color: #374151;
    }

    .verify img {
        height: 25px;
    }

    /* BUTTON */
    .btn {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #9ca3af;  /* grey disabled look */
        color: white;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
    }

    .btn:hover {
        background: #0d48be;
    }

    /* ERROR */
    .error {
        color: red;
        font-size: 14px;
        margin-top: 5px;
    }

    /* LINK */
    .link {
        margin-top: 15px;
        font-size: 14px;
    }

    .link a {
        color: #06b6d4;
        text-decoration: none;
    }

</style>
```

</head>

<body>

<div class="container">

```
<div class="logo">🎓 Student AI</div>

<form method="POST" action="/login">

    <input type="text" name="username" placeholder="Username" required>

    <input type="password" name="password" placeholder="Password" required>

    
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <button class="btn">Sign In</button>

</form>

<div class="link">
    Don’t have an account? <a href="/signup">Sign Up</a>
</div>
```

</div>

</body>
</html>
