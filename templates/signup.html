<!DOCTYPE html>

<html>
<head>
    <title>Signup</title>


<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
    }

    /* CENTER BOX */
    .container {
        width: 350px;
        margin: 80px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .logo {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* INPUT FIELDS */
    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    /* BUTTON */
    .btn {
        width: 100%;
        padding: 10px;
        background: #334155;
        color: white;
        border: none;
        border-radius: 5px;
        margin-top: 10px;
        cursor: pointer;
    }

    .btn:hover {
        background: #1e293b;
    }

    .link {
        margin-top: 15px;
        font-size: 14px;
    }

    .link a {
        text-decoration: none;
        color: #06b6d4;
    }

</style>


</head>

<body>

<div class="container">

<div class="logo">🎓 Student AI</div>

<form method="POST" action="/signup">

    <input type="text" name="username" placeholder="Username" required>

    <input type="password" name="password" placeholder="Password" required>

    <input type="password" name="confirm_password" placeholder="Confirm Password" required>

    <button class="btn">Register</button>

</form>

<div class="link">
    Already have an account? <a href="/login">Log In</a>
</div>


</div>

</body>
</html>
